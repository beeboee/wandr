title: wandr Setup
path: wandr-setup
icon: mdi:map-plus
type: sections
max_columns: 2
sections:
  - type: grid
    cards:
      - type: heading
        heading: 1. Route Basics
        heading_style: title
        icon: mdi:map-marker-path
      - type: entities
        title: Start Here
        entities:
          - entity: text.wandr_start_address
            name: Start Address
          - entity: switch.wandr_loop_route
            name: Loop Route
          - entity: text.wandr_end_address
            name: End Address
          - entity: number.wandr_target_miles
            name: Desired Miles
          - entity: number.wandr_pace
            name: Walking Pace

  - type: grid
    cards:
      - type: heading
        heading: 2. Route Preferences
        heading_style: title
        icon: mdi:tune
      - type: entities
        title: How routes should feel
        entities:
          - entity: select.wandr_route_style
            name: Route Style
          - entity: select.wandr_a_to_b_goal_mode
            name: A-to-B Goal Mode
          - entity: switch.wandr_allow_relaxed_fallback
            name: Relaxed Fallback
          - entity: number.wandr_base_route_count
            name: Base Route Count

  - type: grid
    cards:
      - type: heading
        heading: 3. Generate
        heading_style: title
        icon: mdi:refresh
      - type: button
        entity: button.wandr_generate_routes
        name: Generate Routes
        icon: mdi:refresh
        tap_action:
          action: press
      - type: entities
        title: Generator Status
        entities:
          - entity: sensor.wandr_generation_status
          - entity: sensor.wandr_last_generation_summary
          - entity: sensor.wandr_validation_warnings
          - entity: sensor.wandr_last_error

  - type: grid
    cards:
      - type: heading
        heading: 4. Use Today's Walk
        heading_style: title
        icon: mdi:walk
      - type: entities
        title: Today's Route
        entities:
          - entity: sensor.wandr_route_name
          - entity: sensor.wandr_distance
          - entity: sensor.wandr_estimated_duration
          - entity: sensor.wandr_route_quality_score
      - type: horizontal-stack
        cards:
          - type: button
            entity: button.wandr_pick_today_route
            name: Pick Today
            tap_action:
              action: press
          - type: button
            entity: button.wandr_mark_completed
            name: Complete
            tap_action:
              action: press
