title: wandr
path: wandr
icon: mdi:walk
type: sections
max_columns: 2

sections:
  - type: grid
    cards:
      - type: custom:wandr-card
        view: route
        route_mode: current
        route_entity: sensor.wandr_route_name
        json_url: /local/wandr/current_route.json

  - type: grid
    cards:
      - type: custom:wandr-card
        view: generate
        route_mode: loop

      - type: custom:wandr-card
        view: generate
        route_mode: a_to_b

      - type: entities
        title: Route Settings
        show_header_toggle: false
        entities:
          - entity: text.wandr_start_address
            name: Start
          - entity: text.wandr_end_address
            name: End
          - entity: number.wandr_target_miles
            name: Target Miles
          - entity: number.wandr_pace
            name: Pace
          - entity: select.wandr_route_style
            name: Style
          - entity: number.wandr_base_route_count
            name: Base Route Count
          - entity: switch.wandr_allow_relaxed_fallback
            name: Relaxed Fallback

      - type: entities
        title: A-to-B Options
        show_header_toggle: false
        entities:
          - entity: select.wandr_a_to_b_goal_mode
            name: Goal
          - entity: number.wandr_a_to_b_extra_miles
            name: Extra Miles
          - entity: number.wandr_a_to_b_extra_percent
            name: Extra Percent
          - entity: number.wandr_a_to_b_extra_minutes
            name: Extra Minutes
          - entity: time.wandr_a_to_b_finish_by_time
            name: Finish By

  - type: grid
    cards:
      - type: custom:wandr-card
        view: avoid

      - type: custom:wandr-card
        view: navigate

  - type: grid
    cards:
      - type: custom:wandr-card
        view: progress

      - type: entities
        title: Daily Automation
        show_header_toggle: false
        entities:
          - entity: switch.wandr_auto_pick_daily_route
            name: Auto Pick Route
          - entity: time.wandr_daily_pick_time
            name: Pick Time

  - type: grid
    cards:
      - type: custom:wandr-card
        view: files
